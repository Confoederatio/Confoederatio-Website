<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tile Editor Pro v4</title>
    <style>
      :root {
        --primary: #2563eb;
        --secondary: #64748b;
        --accent: #f59e0b;
        --bg: #0f172a;
        --panel: #1e293b;
        --border: #334155;
        --text: #f1f5f9;
        --input-bg: #0f172a;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        background-color: var(--bg);
        color: var(--text);
        margin: 0;
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }

      .main-layout {
        display: flex;
        flex: 1;
        overflow: hidden;
      }

      /* Sidebar */
      .sidebar {
        width: 320px;
        background: var(--panel);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        padding: 1rem;
        overflow-y: auto;
      }

      .section {
        margin-bottom: 1.5rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid var(--border);
      }

      h3 {
        margin: 0 0 1rem 0;
        font-size: 0.8rem;
        text-transform: uppercase;
        color: var(--secondary);
      }

      .form-group {
        margin-bottom: 0.8rem;
      }

      label {
        display: block;
        font-size: 0.75rem;
        margin-bottom: 0.3rem;
        color: #94a3b8;
      }

      input,
      select {
        width: 100%;
        padding: 0.5rem;
        background: var(--input-bg);
        border: 1px solid var(--border);
        border-radius: 4px;
        color: white;
        font-size: 0.9rem;
        box-sizing: border-box;
      }

      .btn {
        width: 100%;
        padding: 0.6rem;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: 600;
        margin-top: 0.5rem;
      }

      .btn-delete {
        background: #ef4444;
        margin-top: 1rem;
      }

      /* Canvas */
      .canvas-area {
        flex: 1;
        position: relative;
        background: #020617;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      canvas {
        background-color: #ffffff;
        box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
        cursor: crosshair;
        image-rendering: pixelated;
      }

      /* Status Bar */
      .status-bar {
        position: absolute;
        top: 1rem;
        right: 1rem;
        background: rgba(0, 0, 0, 0.8);
        padding: 0.5rem 1rem;
        border-radius: 4px;
        font-family: monospace;
        font-size: 0.8rem;
        pointer-events: none;
        border: 1px solid var(--border);
        z-index: 10;
      }

      /* Bottom Panel */
      .bottom-panel {
        height: 250px;
        background: var(--panel);
        border-top: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        padding: 1rem;
      }

      #jsonTextarea {
        flex: 1;
        font-family: "Fira Code", monospace;
        font-size: 0.8rem;
        padding: 0.5rem;
        background: #0f172a;
        color: #10b981;
        border: 1px solid var(--border);
        border-radius: 4px;
        resize: none;
      }

      .json-controls {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0.5rem;
      }
    </style>
  </head>
  <body>
    <div class="main-layout">
      <div class="sidebar">
        <!-- Canvas Configuration -->
        <div class="section">
          <h3>Canvas Config</h3>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px">
            <div class="form-group">
              <label>Width</label>
              <input type="number" id="cfgW" />
            </div>
            <div class="form-group">
              <label>Height</label>
              <input type="number" id="cfgH" />
            </div>
          </div>
        </div>

        <!-- Tile Creation -->
        <div class="section">
          <h3>Create New Tile</h3>
          <button class="btn" id="btnNewTile">+ Add New Tile</button>
        </div>

        <!-- Selection Editor -->
        <div class="section" id="editSection" style="display: none">
          <h3 id="editTitle" style="color: var(--accent)">Edit Selected</h3>
          <div class="form-group">
            <label>Name</label>
            <input type="text" id="editName" />
          </div>

          <div class="form-group">
            <label>Preset Size</label>
            <select id="editPreset">
              <option value="custom">Custom</option>
              <option value="32">32x32</option>
              <option value="28">28x28</option>
              <option value="24">24x24</option>
              <option value="18">18x18</option>
              <option value="16">16x16</option>
              <option value="12">12x12</option>
            </select>
          </div>

          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px">
            <div class="form-group">
              <label>X Position</label>
              <input type="number" id="editX" />
            </div>
            <div class="form-group">
              <label>Y Position</label>
              <input type="number" id="editY" />
            </div>
            <div class="form-group">
              <label>Width</label>
              <input type="number" id="editW" />
            </div>
            <div class="form-group">
              <label>Height</label>
              <input type="number" id="editH" />
            </div>
          </div>
          <button class="btn btn-delete" id="btnDeleteTile">Delete Tile</button>
        </div>
      </div>

      <div class="canvas-area">
        <canvas id="mainCanvas"></canvas>
        <div class="status-bar" id="statusBar">
          PAN: 0, 0 | ZOOM: 100%
        </div>
      </div>
    </div>

    <div class="bottom-panel">
      <div class="json-controls">
        <h3>Live Data (JSON)</h3>
        <button class="btn" style="width: auto; margin: 0" id="btnApplyJson">
          Sync JSON to Editor
        </button>
      </div>
      <textarea id="jsonTextarea"></textarea>
    </div>

    <script>
      const canvas = document.getElementById("mainCanvas");
      const ctx = canvas.getContext("2d");
      const jsonArea = document.getElementById("jsonTextarea");
      const statusBar = document.getElementById("statusBar");

      // App State
      let state = {
        config: { width: 800, height: 600 },
        view: { zoom: 1.0, panX: 0, panY: 0 },
        tiles: [],
        selectedIndex: -1,
      };

      // Control Variables
      let isPanning = false;
      let isDragging = false;
      let lastMouse = { x: 0, y: 0 };
      let dragOffset = { x: 0, y: 0 };

      /** Initial Setup **/
      function init() {
        const saved = localStorage.getItem("tile_editor_v4");
        if (saved) {
          try {
            state = JSON.parse(saved);
          } catch (e) {
            console.error("Storage load failed");
          }
        }
        syncInputs();
        render();
      }

      function save() {
        localStorage.setItem("tile_editor_v4", JSON.stringify(state));
        jsonArea.value = JSON.stringify(state, null, 2);
      }

      /** Coordinate Math **/
      function getMousePos(e) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: e.clientX - rect.left,
          y: e.clientY - rect.top,
        };
      }

      function screenToWorld(sx, sy) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: Math.round((sx - rect.left - state.view.panX) / state.view.zoom),
          y: Math.round((sy - rect.top - state.view.panY) / state.view.zoom),
        };
      }

      /** Rendering **/
      function render() {
        canvas.width = state.config.width;
        canvas.height = state.config.height;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        ctx.translate(state.view.panX, state.view.panY);
        ctx.scale(state.view.zoom, state.view.zoom);

        // Draw simple background grid
        ctx.strokeStyle = "#e2e8f0";
        ctx.lineWidth = 0.5 / state.view.zoom;
        for (let i = 0; i <= canvas.width; i += 32) {
          ctx.beginPath();
          ctx.moveTo(i, 0);
          ctx.lineTo(i, canvas.height);
          ctx.stroke();
        }
        for (let j = 0; j <= canvas.height; j += 32) {
          ctx.beginPath();
          ctx.moveTo(0, j);
          ctx.lineTo(canvas.width, j);
          ctx.stroke();
        }

        // Draw Tiles
        state.tiles.forEach((t, i) => {
          const isSelected = state.selectedIndex === i;
          
          // Fill
          ctx.fillStyle = isSelected ? "rgba(245, 158, 11, 0.4)" : "rgba(37, 99, 235, 0.25)";
          ctx.fillRect(t.x, t.y, t.w, t.h);

          // Outline
          ctx.strokeStyle = isSelected ? "#f59e0b" : "#2563eb";
          ctx.lineWidth = (isSelected ? 3 : 1) / state.view.zoom;
          ctx.strokeRect(t.x, t.y, t.w, t.h);

          // Label
          ctx.fillStyle = "#1e293b";
          ctx.font = `bold ${11 / state.view.zoom}px monospace`;
          ctx.fillText(
            `${t.name} (${t.x},${t.y})`,
            t.x + 2 / state.view.zoom,
            t.y + 11 / state.view.zoom
          );
        });

        ctx.restore();

        // Status Bar
        statusBar.innerText = `PAN: ${Math.round(state.view.panX)}, ${Math.round(
          state.view.panY
        )} | ZOOM: ${Math.round(state.view.zoom * 100)}%`;
      }

      /** UI Syncing **/
      function syncInputs() {
        document.getElementById("cfgW").value = state.config.width;
        document.getElementById("cfgH").value = state.config.height;

        const editPanel = document.getElementById("editSection");
        if (state.selectedIndex >= 0 && state.tiles[state.selectedIndex]) {
          editPanel.style.display = "block";
          const t = state.tiles[state.selectedIndex];
          document.getElementById("editName").value = t.name;
          document.getElementById("editX").value = t.x;
          document.getElementById("editY").value = t.y;
          document.getElementById("editW").value = t.w;
          document.getElementById("editH").value = t.h;

          // Sync preset dropdown
          const presetSelect = document.getElementById("editPreset");
          if (t.w === t.h && ["32", "28", "24", "18", "16", "12"].includes(t.w.toString())) {
            presetSelect.value = t.w.toString();
          } else {
            presetSelect.value = "custom";
          }
        } else {
          editPanel.style.display = "none";
        }
        
        jsonArea.value = JSON.stringify(state, null, 2);
      }

      /** Listeners - Controls **/
      document.getElementById("btnNewTile").addEventListener("click", () => {
        const newTile = { name: "Tile_" + state.tiles.length, x: 0, y: 0, w: 32, h: 32 };
        state.tiles.push(newTile);
        state.selectedIndex = state.tiles.length - 1;
        syncInputs();
        save();
        render();
      });

      document.getElementById("btnDeleteTile").addEventListener("click", () => {
        if (state.selectedIndex === -1) return;
        state.tiles.splice(state.selectedIndex, 1);
        state.selectedIndex = -1;
        syncInputs();
        save();
        render();
      });

      document.getElementById("btnApplyJson").addEventListener("click", () => {
        try {
          const data = JSON.parse(jsonArea.value);
          state = data;
          syncInputs();
          render();
          save();
        } catch (e) {
          alert("Invalid JSON format!");
        }
      });

      // Handle Preset Dropdown
      document.getElementById("editPreset").addEventListener("change", (e) => {
        if (state.selectedIndex === -1 || e.target.value === "custom") return;
        const val = parseInt(e.target.value);
        const t = state.tiles[state.selectedIndex];
        t.w = val;
        t.h = val;
        syncInputs();
        save();
        render();
      });

      // Handle Manual Input Changes
      const autoSyncIds = ["cfgW", "cfgH", "editName", "editX", "editY", "editW", "editH"];
      autoSyncIds.forEach(id => {
        document.getElementById(id).addEventListener("input", () => {
          state.config.width = parseInt(document.getElementById("cfgW").value) || 800;
          state.config.height = parseInt(document.getElementById("cfgH").value) || 600;
          
          if (state.selectedIndex !== -1) {
            const t = state.tiles[state.selectedIndex];
            t.name = document.getElementById("editName").value;
            t.x = Math.round(document.getElementById("editX").value) || 0;
            t.y = Math.round(document.getElementById("editY").value) || 0;
            t.w = Math.round(document.getElementById("editW").value) || 1;
            t.h = Math.round(document.getElementById("editH").value) || 1;
          }
          save();
          render();
          // We don't call syncInputs() here to avoid selection/focus jumping, 
          // but we update JSON textarea manually
          jsonArea.value = JSON.stringify(state, null, 2);
        });
      });

      /** Mouse Interaction **/
      canvas.addEventListener("mousedown", (e) => {
        const world = screenToWorld(e.clientX, e.clientY);
        lastMouse = { x: e.clientX, y: e.clientY };

        // Right Click or Ctrl+Click for Pan
        if (e.button === 2 || (e.button === 0 && e.ctrlKey)) {
          isPanning = true;
          return;
        }

        // Selection / Start Drag
        let hit = -1;
        for (let i = state.tiles.length - 1; i >= 0; i--) {
          const t = state.tiles[i];
          if (world.x >= t.x && world.x <= t.x + t.w && world.y >= t.y && world.y <= t.y + t.h) {
            hit = i;
            break;
          }
        }

        state.selectedIndex = hit;
        if (hit !== -1) {
          isDragging = true;
          const t = state.tiles[hit];
          dragOffset = { x: world.x - t.x, y: world.y - t.y };
        }
        
        syncInputs();
        render();
      });

      window.addEventListener("mousemove", (e) => {
        if (isPanning) {
          state.view.panX += e.clientX - lastMouse.x;
          state.view.panY += e.clientY - lastMouse.y;
          lastMouse = { x: e.clientX, y: e.clientY };
          render();
        } else if (isDragging && state.selectedIndex !== -1) {
          const world = screenToWorld(e.clientX, e.clientY);
          const t = state.tiles[state.selectedIndex];
          // Force Integer Positions
          t.x = Math.round(world.x - dragOffset.x);
          t.y = Math.round(world.y - dragOffset.y);
          syncInputs();
          render();
        }
      });

      window.addEventListener("mouseup", () => {
        if (isPanning || isDragging) save();
        isPanning = false;
        isDragging = false;
      });

      canvas.addEventListener("wheel", (e) => {
        e.preventDefault();
        const mouse = getMousePos(e);
        const worldBefore = {
          x: (mouse.x - state.view.panX) / state.view.zoom,
          y: (mouse.y - state.view.panY) / state.view.zoom,
        };

        const zoomFactor = e.deltaY > 0 ? 0.9 : 1.1;
        state.view.zoom = Math.min(Math.max(state.view.zoom * zoomFactor, 0.1), 10);

        state.view.panX = mouse.x - worldBefore.x * state.view.zoom;
        state.view.panY = mouse.y - worldBefore.y * state.view.zoom;

        save();
        render();
      });

      canvas.addEventListener("contextmenu", (e) => e.preventDefault());

      // Start
      init();
    </script>
  </body>
</html>
